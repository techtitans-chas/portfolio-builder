databases:
  - name: portfolio-builder-db
    databaseName: portfolio_builder
    user: portfolio_builder
    plan: free
    region: frankfurt

services:
  - type: web
    name: portfolio-builder-backend
    runtime: image
    image:
      url: docker.io/DOCKER_USERNAME/portfolio-builder-backend:latest
    plan: starter
    region: frankfurt
    autoDeploy: false
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3111'
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-builder-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

  - type: web
    name: portfolio-builder-frontend
    runtime: image
    image:
      url: docker.io/DOCKER_USERNAME/portfolio-builder-frontend:latest
    plan: starter
    region: frankfurt
    autoDeploy: false
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NUXT_HOST
        value: '0.0.0.0'
      - key: NUXT_PUBLIC_API_URL
        sync: false
      - key: NUXT_API_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
