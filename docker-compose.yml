services:
  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8
    environment:
      MYSQL_USER: ${MYSQL_USER:-portfolio}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-portfolio}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-portfolio_builder}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          '${MYSQL_USER:-portfolio}',
          '-p${MYSQL_PASSWORD:-portfolio}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend (Hono) ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      target: backend
    stdin_open: true
    tty: true
    # Override dev command — env vars come from Docker, no --env-file needed
    command: pnpm --filter backend exec tsx watch src/server.ts
    environment:
      CI: 'true'
      PORT: ${PORT:-3111}
      DATABASE_URL: mysql://${MYSQL_USER:-portfolio}:${MYSQL_PASSWORD:-portfolio}@mysql:3306/${MYSQL_DATABASE:-portfolio_builder}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3111}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-portfolio-builder}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    ports:
      - '3111:3111'
    volumes:
      - .:/app
      - nm_root:/app/node_modules
      - nm_backend:/app/backend/node_modules
      - nm_shared:/app/shared/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:${PORT:-3111}/api/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ── Frontend (Nuxt) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      target: frontend
    stdin_open: true
    tty: true
    command: pnpm --filter frontend dev
    environment:
      CI: 'true'
      NUXT_HOST: 0.0.0.0
      NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL:-http://localhost:3111}
      NUXT_API_URL: ${NUXT_API_URL:-http://backend:3111}
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - nm_root:/app/node_modules
      - nm_frontend:/app/frontend/node_modules
      - nm_shared:/app/shared/node_modules
      - nuxt_build:/app/frontend/.nuxt
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  nm_root:
  nm_backend:
  nm_shared:
  nm_frontend:
  nuxt_build:
